<svg viewBox="0 0 640 520" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="FDM 3D printer building a part on the bed">
  <defs>
    <linearGradient id="steel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fafafb"/>
      <stop offset="1" stop-color="#eceef1"/>
    </linearGradient>
  </defs>

  <!-- ground shadow -->
  <ellipse cx="320" cy="486" rx="220" ry="14" fill="#15161a" opacity="0.06"/>

  <!-- machine frame (gantry cube) -->
  <g fill="none" stroke="#15161a" stroke-width="3" stroke-linejoin="round">
    <!-- base -->
    <rect x="118" y="404" width="404" height="40" rx="3" fill="url(#steel)"/>
    <!-- uprights -->
    <rect x="128" y="92" width="20" height="316" rx="2" fill="url(#steel)"/>
    <rect x="492" y="92" width="20" height="316" rx="2" fill="url(#steel)"/>
    <!-- top beam -->
    <rect x="118" y="80" width="404" height="22" rx="3" fill="url(#steel)"/>
  </g>

  <!-- X gantry rail -->
  <rect x="148" y="150" width="344" height="14" rx="2" fill="#d8dadf" stroke="#15161a" stroke-width="2.5"/>

  <!-- print head / carriage -->
  <g>
    <rect x="300" y="138" width="70" height="56" rx="3" fill="#15161a"/>
    <rect x="312" y="150" width="20" height="20" rx="1" fill="#62656e"/>
    <!-- orange accent on the toolhead -->
    <rect x="300" y="138" width="70" height="7" rx="2" fill="#D2531B"/>
    <!-- nozzle -->
    <path d="M328 194 L342 194 L337 214 L333 214 Z" fill="#62656e" stroke="#15161a" stroke-width="2"/>
  </g>

  <!-- extruded part on the bed: a layered bracket -->
  <g stroke="#15161a" stroke-width="2.2" stroke-linejoin="round">
    <rect x="262" y="350" width="116" height="46" rx="2" fill="#f0ad8d"/>
    <rect x="262" y="332" width="116" height="20" rx="2" fill="#e8946a"/>
    <rect x="288" y="300" width="64" height="34" rx="2" fill="#D2531B"/>
    <!-- printed layer lines -->
    <g stroke="#b8440f" stroke-width="1" opacity="0.6">
      <line x1="294" y1="308" x2="346" y2="308"/>
      <line x1="294" y1="316" x2="346" y2="316"/>
      <line x1="294" y1="324" x2="346" y2="324"/>
    </g>
    <!-- mounting holes -->
    <circle cx="284" cy="373" r="6" fill="#fff"/>
    <circle cx="356" cy="373" r="6" fill="#fff"/>
  </g>

  <!-- filament strand from head down to part -->
  <path d="M335 214 C335 250 350 270 320 300" fill="none" stroke="#D2531B" stroke-width="2.5" stroke-linecap="round" opacity="0.85"/>

  <!-- build plate -->
  <rect x="232" y="396" width="176" height="12" rx="2" fill="#62656e" stroke="#15161a" stroke-width="2.5"/>

  <!-- filament spool, mounted on top -->
  <g transform="translate(176,40)">
    <circle cx="0" cy="0" r="34" fill="url(#steel)" stroke="#15161a" stroke-width="3"/>
    <circle cx="0" cy="0" r="10" fill="#15161a"/>
    <circle cx="0" cy="0" r="22" fill="none" stroke="#D2531B" stroke-width="6" opacity="0.8"/>
  </g>
  <path d="M176 74 C176 110 250 120 335 138" fill="none" stroke="#D2531B" stroke-width="2" opacity="0.55"/>
</svg>
